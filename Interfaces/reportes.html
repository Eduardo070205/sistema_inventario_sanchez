<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registros de Reportes</title>
    <link rel="stylesheet" href="css/reportes.css">
    <link rel="stylesheet" href="css/header.css">

</head>
<body>
    <div class="container">
   
        <header class="header">
            <div class="header-content">
                <h1 id="page-title">Reportes</h1>
                <div class="header-icons">
                    <a class="icon-btn" title="Inicio" href="home.html">
                        <img src="img/home.png" alt="Botón Inicio" class="icon-btn">
                    </a>
                    <a class="icon-btn" title="Salir">
                        <img src="img/exit.png" alt="Botón Salir" class="icon-btn">
                    </a>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="content-grid">
                <aside class="left-panel">
                    <div class="profile-card">
                        <div class="profile-avatar">
                            <img src="img/user2.png" alt="Logo de usuario" class="profile-avatar-img">
                        </div>
                        <p class="profile-label">Usuario ####</p>
                    </div>

                    <div class="form-section">
                        <input type="text" class="username-input" placeholder="Tipo de Reporte">
                        <div class="buttons-group">
                            <button class="btn btn-primary">Añadir</button>
                            <button class="btn btn-primary">Eliminar</button>
                            <button class="btn btn-primary">Consultar</button>
                            <button class="btn btn-primary">Cambiar</button>
                        </div>
                    </div>
                </aside>

                <section class="right-panel">
                    <div class="reports-table-container">
                        <h3>Lista de Reportes</h3>
                        <table class="reports-table">
                            <thead>
                                <tr>
                                    <th>Fecha</th>
                                    <th>Tipo</th>
                                    <th>Descripción</th>
                                    <th>Estado</th>
                                    <th>Usuario</th>

                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>22/06/2023</td>
                                    <td>Tipo 1</td>
                                    <td>Descripción del reporte 1</td>
                                    <td>Estado 1</td>
                                    <td>Usuario 1</td>

                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>
</body>
</html>
