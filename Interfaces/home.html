<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <div class="container">

        <div id="header"></div>

        <script>
            window.pageTitle = 'Inicio';
            fetch('componentes/header.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('header').innerHTML = html;
                document.getElementById('page-title').innerText = window.pageTitle || "Materiales de Construcción Sánchez";
            });
        </script>

    </div>




</body>
</html>
