<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - Materiales de Construcción Sánchez</title>
    <link rel="stylesheet" href="css/iniciar_sesion.css">
    <link rel="stylesheet" href="css/header.css">
</head>
<body>
    <div class="container">
        <div id="header"></div>

        <script>
            window.pageTitle = 'Iniciar Sesión';
            fetch('componentes/header.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('header').innerHTML = html;
                document.getElementById('page-title').innerText = window.pageTitle || "Materiales de Construcción Sánchez";
            });
        </script>

        <main class="content" aria-label="Formulario de inicio de sesión">

            <img src="img/user.png" alt="Logo de Materiales de Construcción Sánchez" class="avatar" >

            <form class="form" action="#" method="post">
                <div class="input-group">
                    <input type="text" name="usuario" placeholder="Usuario" required autofocus>
                </div>

                <div class="input-group">
                    <input type="password" name="contraseña" placeholder="Contraseña" required autofocus>
                </div>

                <button type="submit" class="btn">Iniciar Sesión</button>
                <button type="submit" class="btn">Restablecer</button>

            </form>

            <p class="footer">Ingrese su usuario para continuar.</p>
        </main>
    </div>
</body>
</html>
