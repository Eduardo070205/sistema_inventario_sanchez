<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - Materiales de Construcción Sánchez</title>
    <link rel="stylesheet" href="css/iniciar_sesion.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>MATERIALES DE CONSTRUCCIÓN SÁNCHEZ</h1>
        </header>

        <main class="content" aria-label="Formulario de inicio de sesión">

            <img src="img/user.png" alt="Logo de Materiales de Construcción Sánchez" class="avatar" >

            <form class="form" action="#" method="post">
                <div class="input-group">
                    <input type="text" name="usuario" placeholder="Usuario" >
                </div>

                <div class="input-group">
                    <input type="password" name="contraseña" placeholder="Contraseña" >
                </div>

                <a href="home.html">

                    <button type="submit" class="btn">Iniciar Sesión</button>

                </a>
   
                <button type="submit" class="btn">Restablecer</button>

            </form>

            <p class="footer">Ingrese su usuario para continuar.</p>
        </main>
    </div>
</body>
</html>
