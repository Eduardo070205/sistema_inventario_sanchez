<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modificar Cliente</title>
    <link rel="stylesheet" href="css/formularios.css">
</head>
<body>
    <div class="container">
        <div id="header"></div>
        <script>
            window.pageTitle = 'Modificar Cliente';
            fetch('componentes/header.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('header').innerHTML = html;
                document.getElementById('page-title').innerText = window.pageTitle;
            });
        </script>

        <main class="main-content form-page">
            <h2>Modificar Cliente</h2>
            <form class="module-form">
                <label>ID Cliente<input type="text" name="id_cliente" value="20" readonly></label>
                <label>Nombre<input type="text" name="nombre" value="Empresa ABC"></label>
                <label>Teléfono<input type="text" name="telefono" value="+52 55 1234 5678"></label>
                <label>Dirección<input type="text" name="direccion" value="Calle Ficticia 123, Ciudad"></label>
                <label>Correo<input type="email" name="correo" value="contacto@empresaabc.com"></label>
                <div class="form-buttons">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <button type="button" class="btn btn-secondary" onclick="window.history.back();">Cancelar</button>
                </div>
            </form>
        </main>
    </div>
</body>
</html>
