<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Usuario</title>
    <link rel="stylesheet" href="../css/formularios.css">
</head>
<body>
    <div class="container">
        <div id="header"></div>
        <script>
            window.pageTitle = 'Agregar Usuario';
            fetch('../componentes/header.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('header').innerHTML = html;
                document.getElementById('page-title').innerText = window.pageTitle;
            });
        </script>

        <main class="main-content form-page">
            <h2>Agregar Usuario</h2>
            <form class="module-form">
                <label>Nombre<input type="text" name="nombre" placeholder="Nombre completo"></label>
                <label>Nombre de Usuario<input type="text" name="nombre_usuario" placeholder="Nombre de usuario"></label>
                <label>Contraseña<input type="password" name="contrasena" placeholder="Contraseña"></label>
                <label>Fecha de Registro<input type="date" name="fecha_registro"></label>
                <label>Estado<select name="estado">
                    <option value="">Seleccione</option>
                    <option value="activo">Activo</option>
                    <option value="inactivo">Inactivo</option>
                </select></label>
                <label>ID Rol<input type="text" name="id_rol" placeholder="ID de rol"></label>
                <div class="form-buttons">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <button type="button" class="btn btn-secondary" onclick="window.history.back();">Cancelar</button>
                </div>
            </form>
        </main>
    </div>
</body>
</html>
