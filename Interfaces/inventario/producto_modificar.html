<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modificar Producto</title>
    <link rel="stylesheet" href="../css/formularios.css">
</head>
<body>
    <div class="container">
        <div id="header"></div>
        <script>
            window.pageTitle = 'Modificar Producto';
            fetch('../componentes/header.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('header').innerHTML = html;
                document.getElementById('page-title').innerText = window.pageTitle;
            });
        </script>

        <main class="main-content form-page">
            <h2>Modificar Producto</h2>
            <form class="module-form">
                <label>ID Producto<input type="text" name="id_producto" value="10" readonly></label>
                <label>Nombre<input type="text" name="nombre" value="Laptop HP"></label>
                <label>Código<input type="text" name="codigo" value="HP-ENERGY-001"></label>
                <label>Descripción<textarea name="descripcion">Computadora portátil HP de 16GB RAM</textarea></label>
                <label>Precio<input type="number" step="0.01" name="precio" value="15999.00"></label>
                <div class="form-buttons">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <button type="button" class="btn btn-secondary" onclick="window.history.back();">Cancelar</button>
                </div>
            </form>
        </main>
    </div>
</body>
</html>
